# Machine-readable finite_difference_options architecture contract.
# The repository now uses a real src-layout distribution package under
# src/finite_difference_options. The top-level directory named src is only the
# setuptools package root; it is not a public import package.

[contract]
schema_version = 2
name = "finite_difference_options"
mode = "src-layout-distribution-package"

[paths]
package_root = "src/finite_difference_options"
tests_root = "tests"

[topology]
allowed_root_modules = ["__init__.py", "py.typed"]
required_top_level_packages = [
  "api",
  "boundary_conditions",
  "cli",
  "contracts",
  "exceptions",
  "greeks",
  "grids",
  "instruments",
  "integrations",
  "models",
  "plotting",
  "pricing",
  "processes",
  "risk",
  "solvers",
  "utils",
  "validation",
]
allowed_top_level_packages = [
  "api",
  "boundary_conditions",
  "cli",
  "contracts",
  "exceptions",
  "greeks",
  "grids",
  "instruments",
  "integrations",
  "models",
  "plotting",
  "pricing",
  "processes",
  "risk",
  "solvers",
  "utils",
  "validation",
]
max_top_level_package_count = 17
ignore_top_level_dirs = []

[repository_root]
allowed_python_files = []

[documentation]
required_docs = [
  "docs/ARCHITECTURE.md",
  "AGENTS.md",
  "docs/CI_POLICY.md",
  "docs/CANONICAL_IMPLEMENTATION_INVENTORY.md",
]
required_fragments = [
  "docs/architecture_contract.toml",
  "architecture contract",
  "finite_difference_options",
]

[ci]
workflow_paths = [".github/workflows/ci.yml"]
required_fragments = [
  "python -m build --sdist --wheel",
  "python -m twine check dist/*",
  "tests/test_packaging_contract.py",
  "scripts/check_architecture_contract.py",
  "tests/architecture",
]

[[import_rules]]
source = "src/finite_difference_options/pricing"
forbidden_prefixes = ["fastapi", "typer", "uvicorn", "streamlit"]

[[import_rules]]
source = "src/finite_difference_options/integrations"
forbidden_prefixes = ["fastapi", "typer", "uvicorn", "streamlit", "haircut", "pdp", "PDP"]

[[import_rules]]
source = "src/finite_difference_options/contracts"
forbidden_prefixes = ["findiff", "fastapi", "typer", "uvicorn", "streamlit", "matplotlib", "seaborn", "plotly", "haircut", "pdp", "PDP"]

[[canonical_capabilities]]
name = "grids-and-local-metrics"
canonical_modules = ["src/finite_difference_options/grids"]
public_imports = ["finite_difference_options.grids"]
forbidden_legacy_modules = ["src/grids.py", "src/grid.py", "src/nonuniform_grids.py"]
compatibility_shims = []

[[canonical_capabilities]]
name = "stochastic-processes-and-coefficients"
canonical_modules = [
  "src/finite_difference_options/processes",
  "src/finite_difference_options/instruments/operators.py",
]
