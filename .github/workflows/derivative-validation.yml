name: Derivative validation broad matrix

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  broad-matrix:
    name: Greek derivative broad matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install validation profile
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run broad derivative validation
        run: |
          python scripts/run_greek_derivative_validation.py \
            --mode broad \
            --output artifacts/fd-greek-derivative-validation-broad.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: finite-difference-options-greek-derivative-broad-matrix
          path: artifacts/fd-greek-derivative-validation-broad.json
          if-no-files-found: error
          retention-days: 30
