name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[build]'
          python -m build --sdist --wheel
          python -m twine check dist/*
      - name: Clean wheel import smoke outside checkout
        run: |
          python -m venv /tmp/fdo-wheel-smoke
          /tmp/fdo-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/fdo-wheel-smoke/bin/python -m pip install dist/finite_difference_options-*.whl
          cd /tmp
          /tmp/fdo-wheel-smoke/bin/python - <<'PY'
          import importlib
          for name in [
              'finite_difference_options',
              'finite_difference_options.contracts',
              'finite_difference_options.grids',
              'finite_difference_options.integrations.haircut_backend',
              'finite_difference_options.validation.black_scholes_parity',
          ]:
              importlib.import_module(name)
          PY
      - name: Generate release manifest
        run: python scripts/write_release_manifest.py --dist dist --output dist/release-manifest.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: finite-difference-options-dist-py${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development profile
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Static smoke gate
        run: |
          python -m compileall -q src tests scripts
          ruff check . --select E9,F63,F7,F82
          mypy --ignore-missing-imports --follow-imports=silent src/finite_difference_options/contracts src/finite_difference_options/validation scripts/check_architecture_contract.py
      - name: Architecture and packaging contracts
        run: |
          python scripts/check_architecture_contract.py
          python scripts/check_markdown_links.py
          pytest -q tests/architecture tests/test_packaging_contract.py --no-cov
      - name: Stable regression suite
        run: pytest -q --cov=finite_difference_options --cov-report=xml --junitxml=junit.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: finite-difference-options-test-artifacts-py${{ matrix.python-version }}
          path: |
            coverage.xml
            junit.xml
          if-no-files-found: warn
          retention-days: 14

  optional-profiles:
    name: Optional profile / ${{ matrix.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: package
    strategy:
      fail-fast: false
      matrix:
        profile: [api, cli, ui, viz, validation]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[build]'
          python -m build --wheel
      - name: Install and smoke optional profile
        run: |
          python -m venv /tmp/fdo-${{ matrix.profile }}-profile
          /tmp/fdo-${{ matrix.profile }}-profile/bin/python -m pip install --upgrade pip
          WHEEL=$(ls dist/finite_difference_options-*.whl)
          /tmp/fdo-${{ matrix.profile }}-profile/bin/python -m pip install "${WHEEL}[${{ matrix.profile }}]"
          cd /tmp
          /tmp/fdo-${{ matrix.profile }}-profile/bin/python - <<'PY'
          import importlib
          import os
          profile = os.environ['PROFILE']
          imports = {
              'api': ['finite_difference_options.api.main'],
              'cli': ['finite_difference_options.cli.main'],
              'ui': ['streamlit'],
              'viz': ['matplotlib', 'plotly', 'seaborn'],
              'validation': ['pytest', 'finite_difference_options.validation.black_scholes_parity'],
          }[profile]
          for name in imports:
              importlib.import_module(name)
          PY
        env:
          PROFILE: ${{ matrix.profile }}

  audit:
    name: Audit and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Vulnerability audit and SBOM
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install -r requirements-dev.lock.txt
          python -m pip check
          python -m pip_audit --progress-spinner=off --skip-editable
          cyclonedx-py environment --of JSON -o sbom.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: finite-difference-options-sbom
          path: sbom.json
          if-no-files-found: error
          retention-days: 14

  node:
    name: Optional Node client
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Detect Next.js client
        id: nextjs
        shell: bash
        run: |
          if [ -f nextjs-client/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            if [ -f nextjs-client/package-lock.json ]; then
              echo "lockfile=true" >> "$GITHUB_OUTPUT"
            else
              echo "lockfile=false" >> "$GITHUB_OUTPUT"
              echo "nextjs-client has package.json but no package-lock.json; npm cache and npm ci are disabled."
            fi
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "lockfile=false" >> "$GITHUB_OUTPUT"
            echo "nextjs-client is absent; skipping Node install/test/lint/build/audit."
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.nextjs.outputs.present == 'true'
        with:
          node-version: "20"
      - name: Install dependencies with lockfile
        if: steps.nextjs.outputs.present == 'true' && steps.nextjs.outputs.lockfile == 'true'
        working-directory: nextjs-client
        run: npm ci
      - name: Install dependencies without lockfile
        if: steps.nextjs.outputs.present == 'true' && steps.nextjs.outputs.lockfile != 'true'
        working-directory: nextjs-client
        run: npm install --no-audit --no-fund
      - name: Run tests
        if: steps.nextjs.outputs.present == 'true'
        working-directory: nextjs-client
        run: npm test
      - name: Run lint
        if: steps.nextjs.outputs.present == 'true'
        working-directory: nextjs-client
        run: npm run lint
      - name: Run production build
        if: steps.nextjs.outputs.present == 'true'
        working-directory: nextjs-client
        run: npm run build
      - name: Run npm audit
        if: steps.nextjs.outputs.present == 'true' && steps.nextjs.outputs.lockfile == 'true'
        working-directory: nextjs-client
        run: npm audit --audit-level=high
      - name: Generate frontend SBOM
        if: steps.nextjs.outputs.present == 'true' && steps.nextjs.outputs.lockfile == 'true'
        working-directory: nextjs-client
        run: npm sbom --sbom-format cyclonedx --json > npm-sbom.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.nextjs.outputs.present == 'true' && steps.nextjs.outputs.lockfile == 'true'
        with:
          name: finite-difference-options-node-sbom
          path: nextjs-client/npm-sbom.json
          if-no-files-found: error
          retention-days: 14
