name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Static smoke gate
        run: |
          python -m compileall -q src tests
          ruff check . --select E9,F63,F7,F82
      - name: Architecture contract
        run: python scripts/check_architecture_contract.py
      - name: Architecture fitness gate
        run: pytest -q tests/architecture
      - name: Stable regression suite
        run: |
          pytest -q \
            tests/test_boundary_conditions.py \
            tests/test_callable_bond.py \
            tests/test_fd_backend_capabilities.py \
            tests/test_fd_black_scholes_parity_fixture.py \
            tests/test_finite_difference_greeks.py \
            tests/test_greeks.py \
            tests/test_multidimensional_adapter_coefficients.py \
            tests/test_option_pricer.py \
            tests/test_option_pricer_result.py \
            tests/test_options.py \
            tests/test_pde_pricer.py \
            tests/test_plot_api.py \
            tests/test_plot_backends.py \
            tests/test_pricing_engine_imports.py \
            tests/test_unified_pricing_engine.py \
            tests/test_unified_processes.py

  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]
    steps:
      - uses: actions/checkout@v4
      - name: Detect Next.js client
        id: nextjs
        shell: bash
        run: |
          if [ -f nextjs-client/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            if [ -f nextjs-client/package-lock.json ]; then
              echo "lockfile=true" >> "$GITHUB_OUTPUT"
            else
              echo "lockfile=false" >> "$GITHUB_OUTPUT"
              echo "nextjs-client has package.json but no package-lock.json; npm cache and npm ci are disabled."
            fi
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "lockfile=false" >> "$GITHUB_OUTPUT"
            echo "nextjs-client is absent; skipping Node install/test/lint."
          fi
      - uses: actions/setup-node@v4
        if: steps.nextjs.outputs.present == 'true'
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies with lockfile
        if: steps.nextjs.outputs.present == 'true' && steps.nextjs.outputs.lockfile == 'true'
        working-directory: nextjs-client
        run: npm ci
      - name: Install dependencies without lockfile
        if: steps.nextjs.outputs.present == 'true' && steps.nextjs.outputs.lockfile != 'true'
        working-directory: nextjs-client
        run: npm install --no-audit --no-fund
      - name: Run tests
        if: steps.nextjs.outputs.present == 'true'
        working-directory: nextjs-client
        run: npm test
      - name: Run lint
        if: steps.nextjs.outputs.present == 'true'
        working-directory: nextjs-client
        run: npm run lint
